<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sondaggio MuseMu Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FFFFFF; --paper-2:#F7F7F8; --surface:#F7F7F8; --surface-2:#EFEFF1;
  --rule:#E5E5E7; --rule-2:#D2D2D7;
  --ink:#101010; --ink-2:#3A3A3C; --ink-3:#6E6E73; --ink-4:#A1A1A6; --ink-5:#D2D2D7;
  --accent:#E84B1C; --accent-soft:#FCEEE7; --accent-hover:#C23A11;
  --success:#0F7B5A; --danger:#C2410C; --warning:#B45309;
  --amb-1:#7C3AED; --amb-2:#10916D; --amb-3:#2563EB; --amb-4:#92400E; --amb-5:#0E7490;
  --amb-6:#1D4ED8; --amb-7:#7E22CE; --amb-8:#B45309; --amb-9:#18181B;
  --font-ui:'Inter','Inter Tight',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-display:'Inter Tight','Inter',-apple-system,sans-serif;
  --r-sm:8px; --r-md:12px; --r-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-ui); font-size:16px; line-height:1.55; color:var(--ink); background:var(--paper); -webkit-font-smoothing:antialiased; font-feature-settings:'cv11','ss01'; letter-spacing:-0.005em; min-height:100vh}

.sr-wrap{max-width:720px; margin:0 auto; padding:40px 24px 80px}

.sr-hero{padding:0 0 48px; border-bottom:1px solid var(--rule); margin-bottom:40px}
.sr-eyebrow{font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:20px}
.sr-title{font-family:var(--font-display); font-size:36px; font-weight:600; line-height:1.05; letter-spacing:-0.025em; color:var(--ink); margin-bottom:14px; max-width:560px}
.sr-sub{font-size:15px; color:var(--ink-3); max-width:540px; line-height:1.55}
.sr-meta-row{display:flex; gap:32px; margin-top:32px; padding-top:24px; border-top:1px solid var(--rule); flex-wrap:wrap}
.sr-meta-item{display:flex; flex-direction:column; gap:4px}
.sr-meta-item span:first-child{font-size:11px; color:var(--ink-3); letter-spacing:0.08em; text-transform:uppercase; font-weight:500}
.sr-meta-item span:last-child{font-family:var(--font-display); font-size:22px; font-weight:600; color:var(--ink); font-variant-numeric:tabular-nums; letter-spacing:-0.02em}

.sr-progress-row{display:flex; align-items:center; gap:16px; margin-bottom:32px}
.sr-progress-count{font-family:var(--font-display); font-size:13px; font-weight:600; color:var(--ink); font-variant-numeric:tabular-nums; letter-spacing:-0.01em; min-width:48px}
.sr-progress{flex:1; height:3px; background:var(--surface-2); overflow:hidden}
.sr-progress-bar{height:100%; background:var(--ink); transition:width .4s ease}
.sr-progress-pct{font-size:13px; color:var(--ink-3); font-variant-numeric:tabular-nums; min-width:36px; text-align:right}

.sr-card{background:var(--paper); border:1px solid var(--rule); border-radius:var(--r-lg); padding:36px; margin-bottom:24px}

.sr-dim-tag{display:inline-flex; align-items:center; gap:8px; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); font-weight:500; margin-bottom:20px}
.sr-dim-tag::before{content:''; width:8px; height:8px; border-radius:50%; background:var(--dim-color, var(--ink))}

.sr-q-num{font-size:11px; color:var(--ink-3); letter-spacing:0.1em; text-transform:uppercase; font-weight:500; margin-bottom:14px}
.sr-q-text{font-family:var(--font-display); font-size:22px; font-weight:500; line-height:1.25; letter-spacing:-0.02em; color:var(--ink); margin-bottom:12px}
.sr-q-help{display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--ink-3); cursor:pointer; margin-bottom:18px; padding:6px 12px; border:1px solid var(--rule); border-radius:999px; transition:all .15s; user-select:none}
.sr-q-help:hover{color:var(--ink); border-color:var(--ink-3)}
.sr-q-help::before{content:'?'; width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; background:var(--ink); color:var(--paper); font-size:10px; font-weight:600}
.sr-tooltip{display:none; background:var(--surface); border-left:2px solid var(--ink); padding:18px 20px; border-radius:0 var(--r-sm) var(--r-sm) 0; font-size:13px; color:var(--ink-2); line-height:1.6; margin-bottom:24px}
.sr-tooltip strong{color:var(--ink); font-weight:600}

.sr-likert{display:grid; grid-template-columns:repeat(5, 1fr); gap:8px; margin-bottom:8px}
.sr-likert-btn{padding:18px 8px 14px; background:var(--paper); border:1px solid var(--rule); border-radius:var(--r-md); text-align:center; cursor:pointer; transition:all .15s; user-select:none}
.sr-likert-btn:hover{border-color:var(--ink); background:var(--surface)}
.sr-likert-btn.active{background:var(--ink); color:var(--paper); border-color:var(--ink)}
.sr-likert-val{font-family:var(--font-display); font-size:22px; font-weight:600; font-variant-numeric:tabular-nums; letter-spacing:-0.02em}
.sr-likert-lbl{font-size:11px; color:var(--ink-3); margin-top:6px; line-height:1.3; font-weight:500}
.sr-likert-btn.active .sr-likert-lbl{color:rgba(255,255,255,.72)}
.sr-likert-scale{display:flex; justify-content:space-between; font-size:11px; color:var(--ink-3); letter-spacing:0.06em; text-transform:uppercase; font-weight:500; margin-top:14px; padding:0 4px}

.sr-multi{display:flex; flex-direction:column; gap:8px; margin-top:8px}
.sr-multi-opt{padding:16px 20px; background:var(--paper); border:1px solid var(--rule); border-radius:var(--r-md); cursor:pointer; transition:all .15s; font-size:14px; color:var(--ink); display:flex; align-items:center; gap:14px}
.sr-multi-opt::before{content:''; width:18px; height:18px; border:1.5px solid var(--ink-4); border-radius:4px; flex-shrink:0; transition:all .15s}
.sr-multi-opt:hover{border-color:var(--ink-3)}
.sr-multi-opt:hover::before{border-color:var(--ink)}
.sr-multi-opt.active{background:var(--surface); border-color:var(--ink)}
.sr-multi-opt.active::before{background:var(--ink); border-color:var(--ink); background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='white' stroke-width='2'><path d='M3 8l3.5 3.5L13 5'/></svg>"); background-size:14px; background-position:center; background-repeat:no-repeat}

.sr-nav{display:flex; justify-content:space-between; align-items:center; margin-top:32px; padding-top:24px; border-top:1px solid var(--rule)}
.sr-btn{padding:13px 26px; border-radius:999px; border:1px solid transparent; font-family:var(--font-ui); font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:8px}
.sr-btn-primary{background:var(--ink); color:var(--paper); border-color:var(--ink)}
.sr-btn-primary:hover{background:#000}
.sr-btn-accent{background:var(--accent); color:var(--paper); border-color:var(--accent)}
.sr-btn-accent:hover{background:var(--accent-hover); border-color:var(--accent-hover)}
.sr-btn-secondary{background:transparent; color:var(--ink); border-color:var(--rule)}
.sr-btn-secondary:hover{border-color:var(--ink)}
.sr-btn:disabled{opacity:.35; cursor:not-allowed}

.sr-divider{margin:80px 0 40px; padding-top:40px; border-top:2px solid var(--ink)}
.sr-divider-label{font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:8px}
.sr-divider h2{font-family:var(--font-display); font-size:30px; font-weight:600; letter-spacing:-0.025em; line-height:1.1; margin-bottom:12px}
.sr-divider p{font-size:15px; color:var(--ink-3); max-width:540px}

.sr-report-grid{display:grid; grid-template-columns:1.2fr 1fr; gap:24px; margin-bottom:24px}
@media(max-width:680px){.sr-report-grid{grid-template-columns:1fr}}

.sr-score-card{background:var(--paper); border:1px solid var(--rule); border-radius:var(--r-lg); padding:32px; display:flex; flex-direction:column; gap:12px}
.sr-score-val{font-family:var(--font-display); font-size:72px; font-weight:600; color:var(--ink); line-height:1; letter-spacing:-0.04em; font-variant-numeric:tabular-nums}
.sr-score-val sup{font-size:22px; color:var(--ink-3); font-weight:500; margin-left:4px}
.sr-score-lbl{font-size:13px; color:var(--ink-3); letter-spacing:0.06em; text-transform:uppercase; font-weight:500}
.sr-score-reading{font-family:var(--font-display); font-size:17px; font-weight:500; color:var(--accent); letter-spacing:-0.01em; margin-top:6px}
.sr-bar-wrap{height:6px; background:var(--surface-2); margin-top:14px; border-radius:3px; overflow:hidden}
.sr-bar{height:100%; background:var(--ink); transition:width 1s ease}

.sr-radar-card{background:var(--surface); border-radius:var(--r-lg); padding:20px; display:flex; align-items:center; justify-content:center; min-height:280px; position:relative}
.sr-radar-card svg{width:100%; height:auto; max-width:280px}
.sr-radar-axis{stroke:var(--ink-5); stroke-width:0.5; fill:none}
.sr-radar-poly{fill:var(--accent); fill-opacity:0.14; stroke:var(--accent); stroke-width:1.5}
.sr-radar-label{font-family:var(--font-ui); font-size:8.5px; fill:var(--ink-3); text-anchor:middle; letter-spacing:0.02em; font-weight:500}

.sr-suggest-list{display:flex; flex-direction:column; gap:0; margin-top:32px}
.sr-suggest{display:flex; gap:20px; padding:24px 0; border-bottom:1px solid var(--rule)}
.sr-suggest:last-child{border-bottom:none}
.sr-suggest-num{font-family:var(--font-display); font-size:30px; font-weight:600; color:var(--ink-4); line-height:1; letter-spacing:-0.02em; font-variant-numeric:tabular-nums; min-width:48px}
.sr-suggest-body{flex:1}
.sr-suggest-title{font-family:var(--font-display); font-size:17px; font-weight:500; color:var(--ink); margin-bottom:6px; letter-spacing:-0.01em}
.sr-suggest-text{font-size:14px; color:var(--ink-3); line-height:1.55}
.sr-suggest-tag{display:inline-block; margin-top:10px; padding:3px 10px; background:var(--accent-soft); color:var(--accent-hover); font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; border-radius:999px}

.sr-cta-row{display:flex; gap:12px; margin-top:32px; flex-wrap:wrap}
.sr-cta-row .sr-btn{flex:1; min-width:220px; justify-content:center}

.sr-optin{background:var(--ink); color:var(--paper); border-radius:var(--r-lg); padding:36px; margin-top:32px}
.sr-optin-eyebrow{font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:12px}
.sr-optin h3{font-family:var(--font-display); font-size:22px; font-weight:500; letter-spacing:-0.02em; margin-bottom:8px; max-width:420px}
.sr-optin p{font-size:14px; color:rgba(255,255,255,0.7); max-width:440px; margin-bottom:20px}
.sr-optin-form{display:flex; gap:8px; flex-wrap:wrap}
.sr-optin input[type=email]{flex:1; min-width:200px; padding:13px 18px; border:1px solid rgba(255,255,255,0.2); background:transparent; color:var(--paper); border-radius:999px; font-family:var(--font-ui); font-size:14px}
.sr-optin input[type=email]::placeholder{color:rgba(255,255,255,0.4)}
.sr-optin input[type=email]:focus{outline:none; border-color:var(--accent)}
.sr-optin-privacy{font-size:11px; color:rgba(255,255,255,0.5); margin-top:14px}

.sr-footer{text-align:center; padding:40px 24px; font-size:12px; color:var(--ink-3); margin-top:60px; border-top:1px solid var(--rule)}
.sr-footer strong{color:var(--ink); font-weight:600}
.sr-loading{text-align:center; padding:60px 20px; font-size:15px; color:var(--ink-3)}
.sr-error{text-align:center; padding:40px; color:var(--danger); background:var(--accent-soft); border-radius:var(--r-md)}

@media(max-width:520px){
  .sr-wrap{padding:24px 16px 60px}
  .sr-title{font-size:28px}
  .sr-card{padding:24px 20px}
  .sr-q-text{font-size:19px}
  .sr-likert-btn{padding:14px 4px 10px}
  .sr-likert-val{font-size:18px}
  .sr-likert-lbl{font-size:10px}
  .sr-score-val{font-size:56px}
  .sr-optin{padding:26px 22px}
  .sr-cta-row .sr-btn{min-width:100%}
}
</style>
</head>
<body>
<div class="sr-wrap" id="sr-app">
  <div class="sr-loading">Caricamento sondaggio...</div>
</div>

<script>
var SURVEY_CODE = '<?= surveyCode ?>';
var state = { schema:null, responses:{}, currentQ:0, responseId:null, timeStart:new Date().toISOString() };

var DIM_COLORS = ['#7C3AED','#10916D','#2563EB','#92400E','#0E7490','#1D4ED8','#7E22CE','#B45309','#18181B'];

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

google.script.run
  .withSuccessHandler(function(schema){
    if(!schema || schema.ok===false){
      $('sr-app').innerHTML='<div class="sr-error">'+(schema&&schema.error||'Sondaggio non trovato')+'</div>';
      return;
    }
    state.schema=schema;
    renderQuestion(0);
  })
  .withFailureHandler(function(err){
    $('sr-app').innerHTML='<div class="sr-error">Errore: '+esc(err&&err.message||err)+'</div>';
  })
  .getMatrixSurveySchema(SURVEY_CODE);

function renderQuestion(idx){
  var s=state.schema, qs=s.questions;
  if(idx>=qs.length){ submitSurvey(); return; }
  if(idx<0) idx=0;
  state.currentQ=idx;
  var q=qs[idx], tot=qs.length, pct=Math.round((idx+1)/tot*100);
  var dimIdx = q.dimensionIndex || 0;
  var dimColor = DIM_COLORS[dimIdx % DIM_COLORS.length];
  var dimLabel = q.dimensionLabel || ('Dimensione '+(dimIdx+1));

  var h='<div class="sr-hero">'
    +'<div class="sr-eyebrow">Duemilamusei &middot; MuseMu Matrix</div>'
    +'<div class="sr-title">'+esc(s.surveyTitle||'Autovalutazione')+'</div>'
    +'<div class="sr-sub">'+esc(s.surveySub||'Diagnosi rapida e riservata della maturita\' della tua struttura culturale.')+'</div>'
    +'<div class="sr-meta-row">'
    +'<div class="sr-meta-item"><span>Domande</span><span>'+tot+'</span></div>'
    +'<div class="sr-meta-item"><span>Tempo</span><span>'+esc(s.metadata&&s.metadata.estimatedCompletionTime||'~ 8 min')+'</span></div>'
    +'<div class="sr-meta-item"><span>Privacy</span><span>Anonimo</span></div>'
    +'</div>'
    +'</div>';

  h+='<div class="sr-progress-row">';
  h+='<span class="sr-progress-count">'+(idx+1)+' / '+tot+'</span>';
  h+='<div class="sr-progress"><div class="sr-progress-bar" style="width:'+pct+'%"></div></div>';
  h+='<span class="sr-progress-pct">'+pct+'%</span>';
  h+='</div>';

  h+='<div class="sr-card">';
  h+='<div class="sr-dim-tag" style="--dim-color:'+dimColor+'">'+esc(dimLabel)+'</div>';
  h+='<div class="sr-q-text">'+esc(q.text)+'</div>';
  if(q.sub) h+='<p class="sr-q-sub" style="font-size:14px;color:var(--ink-3);margin-bottom:16px">'+esc(q.sub)+'</p>';

  if(q.tooltip){
    h+='<div class="sr-q-help" onclick="var t=this.nextElementSibling; t.style.display=(t.style.display===\'block\'?\'none\':\'block\')">Aiuto su questa domanda</div>';
    h+='<div class="sr-tooltip">'+esc(q.tooltip)+'</div>';
  }

  if(q.type==='likert5'){
    var labels=q.labels || ['Siamo all\'inizio','In costruzione','Consolidato','In crescita','Maturo'];
    h+='<div class="sr-likert">';
    for(var i=1;i<=5;i++){
      var act=state.responses[q.code]===i?' active':'';
      h+='<div class="sr-likert-btn'+act+'" onclick="answer(\''+q.code+'\','+i+',this)">'
        +'<div class="sr-likert-val">'+i+'</div>'
        +'<div class="sr-likert-lbl">'+esc(labels[i-1])+'</div></div>';
    }
    h+='</div>';
    h+='<div class="sr-likert-scale"><span>Opportunita\'</span><span>Eccellenza</span></div>';
  } else if(q.type==='multiselect_compositive' && q.options){
    h+='<div class="sr-multi">';
    var sel=state.responses[q.code]||[];
    q.options.forEach(function(opt){
      var val=opt.value||opt;
      var lbl=opt.label||opt;
      var act=sel.indexOf(val)>=0?' active':'';
      h+='<div class="sr-multi-opt'+act+'" onclick="toggleMulti(\''+q.code+'\',\''+esc(val)+'\',this)">'+esc(lbl)+'</div>';
    });
    h+='</div>';
  } else if(q.type==='single' && q.options){
    h+='<div class="sr-multi">';
    q.options.forEach(function(opt){
      var val=opt.value||opt;
      var lbl=opt.label||opt;
      var act=state.responses[q.code]===val?' active':'';
      h+='<div class="sr-multi-opt'+act+'" onclick="answer(\''+q.code+'\',\''+esc(val)+'\',this)">'+esc(lbl)+'</div>';
    });
    h+='</div>';
  }

  h+='<div class="sr-nav">';
  if(idx>0) h+='<button class="sr-btn sr-btn-secondary" onclick="renderQuestion('+(idx-1)+')">&#8592; Indietro</button>';
  else h+='<span></span>';
  var nextLabel=idx===qs.length-1?'Vedi risultato &rarr;':'Avanti &rarr;';
  h+='<button class="sr-btn sr-btn-primary" id="sr-next" onclick="renderQuestion('+(idx+1)+')">'+nextLabel+'</button>';
  h+='</div></div>';

  h+='<div class="sr-footer"><strong>Duemilamusei</strong> &middot; Compilazione anonima &middot; GDPR Reg. UE 2016/679</div>';
  $('sr-app').innerHTML=h;
  window.scrollTo({top:0, behavior:'smooth'});
}

function answer(code,val,el){
  state.responses[code]=val;
  var sibs=el.parentNode.children;
  for(var i=0;i<sibs.length;i++) sibs[i].classList.remove('active');
  el.classList.add('active');
}
function toggleMulti(code,val,el){
  if(!state.responses[code]) state.responses[code]=[];
  var arr=state.responses[code], idx=arr.indexOf(val);
  if(idx>=0){ arr.splice(idx,1); el.classList.remove('active'); }
  else{ arr.push(val); el.classList.add('active'); }
}

function submitSurvey(){
  $('sr-app').innerHTML='<div class="sr-loading">Elaborazione del risultato...</div>';
  var payload={
    responses:state.responses,
    section11:{},
    museumProfile:{},
    museumName:'',
    timestampInizio:state.timeStart,
    timestampFine:new Date().toISOString(),
    completionStatus:'survey_'+SURVEY_CODE
  };
  google.script.run
    .withSuccessHandler(function(result){
      if(!result||!result.ok){
        $('sr-app').innerHTML='<div class="sr-error">Errore: '+esc(result&&result.error||'sconosciuto')+'</div>';
        return;
      }
      state.responseId=result.responseId;
      renderReport(result);
    })
    .withFailureHandler(function(err){
      $('sr-app').innerHTML='<div class="sr-error">Errore salvataggio: '+esc(err&&err.message||err)+'</div>';
    })
    .saveMatrixResponse(payload);
}

function buildRadar9(scores){
  var n=9, cx=150, cy=150, rMax=110;
  var rings=[1, 0.75, 0.5, 0.25];
  var labels=['Brand','Collezione','Edificio','Programma','Servizio','Digitale','Accessib.','Audience','Governance'];
  function pt(i, r){
    var ang = -Math.PI/2 + (2*Math.PI*i/n);
    return [cx+Math.cos(ang)*r, cy+Math.sin(ang)*r];
  }
  var svg='<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"><g>';
  rings.forEach(function(rPct){
    var pts=[];
    for(var i=0;i<n;i++){ var p=pt(i, rMax*rPct); pts.push(p[0]+','+p[1]); }
    svg+='<polygon class="sr-radar-axis" points="'+pts.join(' ')+'"/>';
  });
  for(var i=0;i<n;i++){
    var p=pt(i, rMax);
    svg+='<line class="sr-radar-axis" x1="'+cx+'" y1="'+cy+'" x2="'+p[0]+'" y2="'+p[1]+'"/>';
  }
  var dataPts=[];
  for(var j=0;j<n;j++){
    var v = (scores[j]||0)/100;
    var p = pt(j, rMax*Math.max(0.05, v));
    dataPts.push(p[0]+','+p[1]);
  }
  svg+='<polygon class="sr-radar-poly" points="'+dataPts.join(' ')+'"/>';
  for(var k=0;k<n;k++){
    var pl=pt(k, rMax+18);
    svg+='<text class="sr-radar-label" x="'+pl[0]+'" y="'+pl[1]+'" dy="3">'+labels[k]+'</text>';
  }
  svg+='</g></svg>';
  return svg;
}

function renderReport(result){
  var dims=state.schema.surveyDimensions || [];
  var scoring=result.scoring||{};
  var dimScores=[];
  for(var i=0;i<9;i++){
    var code = dims[i] || ('d'+(i+1));
    dimScores.push(Math.round(scoring[code]||0));
  }
  var total = Math.round(dimScores.reduce(function(a,b){return a+b},0) / 9);
  var reading = total>=80?'Eccellente' : total>=60?'Margine di crescita' : total>=40?'Da sviluppare' : 'Priorita\' urgente';

  var suggestions=[];
  if(state.schema.dimensions){
    state.schema.dimensions.forEach(function(d,i){
      if(i<3 && d.subDimensions && d.subDimensions[0]) suggestions.push({title:d.label||('Dimensione '+(i+1)), text:d.subDimensions[0], service:d.suggestedService||''});
    });
  }
  if(suggestions.length===0){
    suggestions=[
      {title:'Maturita\' digitale e integrazione tecnologica', text:'Un assistente conversazionale AI sulle collezioni puo\' portarvi nel quartile superiore in 6-9 mesi.', service:'MuseGPT'},
      {title:'Accessibilita\' radicale a 4 livelli', text:'Un audit Easy-to-Read europeo + CAA su 3 percorsi tematici e\' il primo intervento ad alto impatto/basso costo.', service:'A4 Audit'},
      {title:'Ecosistema territoriale e governance partecipativa', text:'Un piano di gestione partecipativa formalizzato col distretto culturale riduce la vulnerabilita\' agli avvicendamenti.', service:'MaMa'}
    ];
  }

  var h='<div class="sr-divider"><div class="sr-divider-label">Risultato</div>';
  h+='<h2>Il tuo profilo MuseMu Matrix</h2>';
  h+='<p>Una fotografia onesta della maturita\' del museo sulle 9 dimensioni, con le tre opportunita\' di sviluppo a maggior impatto e i servizi Duemilamusei che possono accelerarle.</p></div>';

  h+='<div class="sr-report-grid">';
  h+='<div class="sr-score-card">';
  h+='<span class="sr-score-lbl">Punteggio complessivo</span>';
  h+='<div class="sr-score-val">'+total+'<sup>/100</sup></div>';
  h+='<div class="sr-score-reading">'+reading+'</div>';
  h+='<div class="sr-bar-wrap"><div class="sr-bar" style="width:'+total+'%"></div></div>';
  h+='</div>';
  h+='<div class="sr-radar-card">'+buildRadar9(dimScores)+'</div>';
  h+='</div>';

  h+='<div class="sr-suggest-list">';
  suggestions.forEach(function(s,i){
    h+='<div class="sr-suggest">';
    h+='<div class="sr-suggest-num">'+String(i+1).padStart(2,'0')+'</div>';
    h+='<div class="sr-suggest-body">';
    h+='<div class="sr-suggest-title">'+esc(s.title)+'</div>';
    h+='<p class="sr-suggest-text">'+esc(s.text)+'</p>';
    if(s.service) h+='<span class="sr-suggest-tag">Servizio Duemilamusei &middot; '+esc(s.service)+'</span>';
    h+='</div></div>';
  });
  h+='</div>';

  h+='<div class="sr-cta-row">';
  h+='<a href="'+getAppUrl()+'" class="sr-btn sr-btn-primary" style="text-decoration:none">Compila il Matrix completo &rarr;</a>';
  h+='<a href="'+getAppUrl()+'?action=prenotazione" class="sr-btn sr-btn-secondary" style="text-decoration:none">Prenota una call gratuita</a>';
  h+='</div>';

  h+='<div class="sr-optin" id="sr-optin-box">';
  h+='<div class="sr-optin-eyebrow">Resta in contatto</div>';
  h+='<h3>Ricevi bandi, normative e best practice mappati sul tuo profilo.</h3>';
  h+='<p>Una sola email al mese. Curata redazionalmente, senza algoritmi. Solo cose che ti riguardano davvero.</p>';
  h+='<div class="sr-optin-form">';
  h+='<input type="email" id="sr-optin-email" placeholder="indirizzo@museo.it">';
  h+='<button class="sr-btn sr-btn-accent" onclick="submitOptIn()">Iscrivimi</button>';
  h+='</div>';
  h+='<div class="sr-optin-privacy">Trattamento dati ex Reg. UE 2016/679. Cancellazione in qualsiasi momento.</div>';
  h+='</div>';

  h+='<div class="sr-footer"><strong>Duemilamusei</strong> &middot; MuseMu Matrix v1.0 &middot; Fano (PU) &middot; Ispirato a Museum Matrix di Matthias Henkel</div>';
  $('sr-app').innerHTML=h;
  window.scrollTo({top:0, behavior:'smooth'});
}

function getAppUrl(){
  try{ return google.script.run.url || ''; }catch(e){ return ''; }
}

function submitOptIn(){
  var email=($('sr-optin-email')||{}).value||'';
  if(!email||email.indexOf('@')<0){ alert('Inserisci un indirizzo email valido'); return; }
  var box=$('sr-optin-box');
  box.innerHTML='<p style="text-align:center;color:rgba(255,255,255,0.7);padding:20px">Salvataggio in corso...</p>';
  google.script.run
    .withSuccessHandler(function(r){
      box.innerHTML='<p style="text-align:center;color:var(--accent);font-weight:600;padding:30px">&#10003; Iscrizione confermata. A presto.</p>';
    })
    .withFailureHandler(function(e){
      box.innerHTML='<p style="text-align:center;color:var(--danger);padding:20px">Errore: '+esc(e&&e.message||e)+'</p>';
    })
    .saveMatrixContact({responseId:state.responseId, email:email, preferences:{digest_tematico:true}});
}
</script>
</body>
</html>
