<!--
  ============================================================
  OSSERVATORIO CULTURALE — TOPBAR.HTML (v4.12 — Redesign Editoriale Museale)
  Design da: Osservatorio - Redesign Mockup.html (Claude Design, 01/05/2026)
  Direzione: Carta da museo — Newsreader + Instrument Serif + Inter
  ------------------------------------------------------------
  File GAS: "Topbar"
  Include nel Index.html.
  ------------------------------------------------------------
  ARCHITETTURA:
  Markup statico. Breadcrumb, contatore notifiche e iniziali
  utente vengono popolati da Navigation.html (OC.hydrate).
  La ricerca globale viene inoltrata a OC.search().
  Il toggle tema (dark/light) usa localStorage e data-theme su <html>.
  ============================================================
-->
<header class="topbar" role="banner">

  <!-- Toggle sidebar mobile -->
  <button class="topbar-hamburger" id="toggleSidebar" aria-label="Apri/chiudi menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Breadcrumb dinamico -->
  <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb">
    <span>Osservatorio</span><span class="sep">/</span><b>Home</b>
  </nav>

  <!-- Ricerca globale -->
  <form class="topbar-search" id="topbarSearchForm"
        onsubmit="event.preventDefault(); OC.search(document.getElementById('globalSearch').value);"
        role="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      type="search"
      id="globalSearch"
      placeholder="Cerca bandi, news, ambiti&hellip;"
      autocomplete="off"
      aria-label="Ricerca globale"
    />
    <kbd class="kbd">&#8984;K</kbd>
  </form>

  <!-- Azioni destra -->
  <div class="topbar-actions">

    <!-- Toggle dark / light mode -->
    <button class="theme-toggle" id="themeToggle" aria-label="Cambia tema" title="Tema chiaro / scuro">
      <!-- Icona sole (light) -->
      <svg id="themeIconLight" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Icona luna (dark) — visibile quando in dark mode -->
      <svg id="themeIconDark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <!-- Notifiche -->
    <button class="topbar-icon" data-action="openNotifiche" aria-label="Notifiche">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="topbar-badge" id="badge-notifiche" hidden>0</span>
    </button>

    <!-- Profilo utente -->
    <button class="topbar-user" data-action="openUserMenu" aria-label="Profilo utente">
      <span class="user-avatar sm" id="topbarUserInitials">&middot;</span>
      <span class="user-info sm">
        <b id="topbarUserName">Ospite</b>
        <span id="topbarUserRole">lettore</span>
      </span>
    </button>

    <!-- Logout (visibile solo se loggato) -->
    <button class="topbar-icon" id="logoutBtn" data-action="doLogout"
            aria-label="Esci" title="Esci dall'osservatorio"
            hidden style="margin-left:4px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>

<!-- Theme toggle — inizializzazione (eseguito subito, prima del paint) -->
<script>
(function(){
  var btn = document.getElementById('themeToggle');
  var iconLight = document.getElementById('themeIconLight');
  var iconDark  = document.getElementById('themeIconDark');

  function applyTheme(dark){
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
    iconLight.style.display = dark  ? 'none' : '';
    iconDark.style.display  = !dark ? 'none' : '';
  }

  var saved = localStorage.getItem('oc-theme');
  var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved ? saved === 'dark' : prefersDark);

  btn.addEventListener('click', function(){
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    localStorage.setItem('oc-theme', isDark ? 'light' : 'dark');
    applyTheme(!isDark);
  });
})();
</script>
